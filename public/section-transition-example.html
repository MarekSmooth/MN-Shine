<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Automotive Detailing - Section Transition</title>
    <link rel="stylesheet" href="section-transition.css">
</head>
<body>
    
    <!-- Sekce 1 -->
    <section class="section section-dark">
        <div class="content">
            <h2>Premium Detailing</h2>
            <p>Dokonalá ochrana laku vašeho vozu</p>
        </div>
    </section>

    <!-- Světelný přechod -->
    <div class="section-transition"></div>

    <!-- Sekce 2 -->
    <section class="section section-dark">
        <div class="content">
            <h2>Profesionální Péče</h2>
            <p>Každý detail na nejvyšší úrovni</p>
        </div>
    </section>

    <!-- Světelný přechod -->
    <div class="section-transition"></div>

    <!-- Sekce 3 -->
    <section class="section section-dark">
        <div class="content">
            <h2>Prémiové Výsledky</h2>
            <p>Váš vůz si zaslouží to nejlepší</p>
        </div>
    </section>

</body>
</html>
